<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f7;--bg2:#fff;--bg3:#f0f0f0;--bg4:#e8e8e8;
  --text:#0a0a0a;--text2:#555;--text3:#999;
  --border:#e2e2e2;--border2:#ccc;
  --accent:#0a0a0a;--accent-hover:#333;
  --danger:#b91c1c;
  --radius:6px;--radius-lg:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-lg:0 6px 24px rgba(0,0,0,.1);
  --tr:all .15s ease;
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","PingFang SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
input,textarea,select{font-family:inherit;font-size:13px;color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;background:var(--bg2);outline:none;transition:var(--tr);width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical}
::placeholder{color:var(--text3)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#app{display:flex;height:100vh}
.sidebar{width:224px;min-width:224px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 18px 14px}
.sidebar-header h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sidebar-header p{font-size:10.5px;color:var(--text3);margin-top:1px}
.sidebar-nav{padding:6px 10px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:var(--tr);user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-icon{width:15px;text-align:center;font-size:12px;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.divider{height:1px;background:var(--border);margin:8px 16px}
.section-label{padding:6px 18px 2px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.project-list{flex:1;overflow-y:auto;padding:4px 10px}
.project-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:var(--tr)}
.project-item:hover{background:var(--bg3)}
.project-item.active{background:var(--bg4);color:var(--text);font-weight:500}
.project-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.project-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.project-count{font-size:10px;color:var(--text3);background:var(--bg3);border-radius:8px;padding:1px 6px;min-width:18px;text-align:center}
.sidebar-footer{padding:10px;display:flex;flex-direction:column;gap:6px}
.btn-new{width:100%;padding:8px;border-radius:var(--radius);font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;color:var(--text3);border:1px dashed var(--border);transition:var(--tr)}
.btn-new:hover{border-color:var(--accent);color:var(--text);background:var(--bg3)}
.sidebar-mode{text-align:center;font-size:10px;color:var(--text3);padding:4px 0}
.sidebar-mode .mode-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-weight:600}
.mode-admin{background:#22c55e;color:#fff}
.mode-read{background:var(--bg3);color:var(--text3)}
.btn-login{width:100%;padding:7px;border-radius:var(--radius);font-size:11px;color:var(--text3);border:1px solid var(--border);transition:var(--tr);text-align:center}
.btn-login:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.main-header{padding:16px 28px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.main-header h2{font-size:17px;font-weight:600;letter-spacing:-.2px}
.header-right{display:flex;gap:8px;align-items:center}
.btn{padding:6px 14px;border-radius:var(--radius);font-size:12px;font-weight:500;transition:var(--tr);display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:var(--danger)}
.btn-danger:hover{background:rgba(185,28,28,.06)}
.btn-icon{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text2);font-size:14px}
.btn-icon:hover{background:var(--bg3);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:20px 28px 40px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
.stat .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat .val{font-size:26px;font-weight:700;margin-top:2px;letter-spacing:-1px}
.stat .sub{font-size:10.5px;color:var(--text3);margin-top:1px}

.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;transition:var(--tr);cursor:default}
.task-item.editable{cursor:pointer}
.task-item:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.task-check{width:17px;height:17px;border:1.5px solid var(--border2);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-check.clickable{cursor:pointer;transition:var(--tr)}
.task-check.clickable:hover{border-color:var(--accent)}
.task-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;font-weight:500}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;line-height:1.6}
.p-urgent{background:var(--accent);color:#fff}
.p-high{background:#444;color:#fff}
.p-medium{background:#e0e0e0;color:#666}
.p-low{background:#f2f2f2;color:#aaa}
.task-date{font-size:10.5px;color:var(--text3)}
.task-date.overdue{color:var(--danger);font-weight:500}
.task-proj{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:3px}

.tabs{display:flex;gap:1px;margin-bottom:14px;background:var(--bg3);border-radius:var(--radius);padding:2px;width:fit-content}
.tab{padding:5px 12px;font-size:11.5px;border-radius:4px;color:var(--text2);transition:var(--tr)}
.tab:hover{color:var(--text)}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500;box-shadow:var(--shadow)}
.quick-add{display:flex;gap:8px;margin-bottom:14px}
.quick-add input{flex:1;font-size:13px}

.tl-controls{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tl-axis{position:relative;padding:0;margin-bottom:8px}
.tl-axis-bar{display:flex;justify-content:space-between;padding:0 2px;margin-bottom:2px}
.tl-axis-label{font-size:9.5px;color:var(--text3);font-weight:500}
.tl-axis-track{position:relative;height:3px;background:var(--bg4);border-radius:2px}
.tl-today-mark{position:absolute;top:-3px;width:2px;height:9px;background:var(--accent);border-radius:1px;z-index:2}
.tl-today-label{position:absolute;top:-16px;font-size:9px;color:var(--accent);font-weight:600;transform:translateX(-50%);white-space:nowrap}
.tl-group{margin-bottom:14px}
.tl-proj-head{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:var(--tr);margin-bottom:2px}
.tl-proj-head:hover{box-shadow:var(--shadow)}
.tl-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-proj-name{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-proj-count{font-size:10.5px;color:var(--text3);flex-shrink:0}
.tl-proj-toggle{font-size:10px;color:var(--text3);flex-shrink:0;transition:transform .15s;width:16px;text-align:center}
.tl-proj-toggle.collapsed{transform:rotate(-90deg)}
.tl-tasks{padding-left:18px;overflow:hidden;transition:max-height .2s ease,opacity .2s ease}
.tl-tasks.collapsed{max-height:0!important;opacity:0}
.tl-task-row{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 12px;border-left:2px solid var(--bg4);margin-left:3px;transition:var(--tr)}
.tl-task-row:hover{background:var(--bg3);border-radius:0 var(--radius) var(--radius) 0}
.tl-task-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tl-task-name{font-size:12px;flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.tl-task-name.done{text-decoration:line-through;color:var(--text3)}
.tl-task-pri{font-size:9px;padding:0 5px;border-radius:2px;font-weight:600;flex-shrink:0;line-height:1.6}
.tl-task-bar-wrap{flex:1;position:relative;height:16px;margin-left:4px}
.tl-task-bar-bg{position:absolute;top:7px;left:0;right:0;height:2px;background:var(--bg4);border-radius:1px}
.tl-task-bar{position:absolute;top:4px;height:8px;border-radius:3px;min-width:4px}
.tl-task-bar.done-bar{opacity:.3}
.tl-task-dates{font-size:10px;color:var(--text3);flex-shrink:0;min-width:90px;text-align:right}
.tl-task-dates.overdue{color:var(--danger);font-weight:500}
.tl-no-tasks{padding:6px 14px 6px 24px;font-size:11px;color:var(--text3);border-left:2px solid var(--bg4);margin-left:3px;font-style:italic}

.note-wizard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.nw-step{margin-bottom:14px}.nw-step:last-child{margin-bottom:0}
.nw-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.nw-step-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.nw-options{display:flex;gap:6px;flex-wrap:wrap}
.nw-opt{padding:6px 14px;border-radius:var(--radius);font-size:12px;border:1px solid var(--border);color:var(--text2);transition:var(--tr);cursor:pointer}
.nw-opt:hover{border-color:var(--accent);color:var(--text)}
.nw-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nw-content textarea{min-height:60px;font-size:13px}
.nw-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.nw-connector{width:1px;height:10px;background:var(--bg4);margin:0 0 0 8px}
.nw-task-form{background:var(--bg3);border-radius:var(--radius);padding:12px;margin-top:8px}
.nw-task-form .fr{display:flex;gap:8px}
.nw-task-form .fg{margin-bottom:8px}.nw-task-form .fg:last-child{margin-bottom:0}
.nw-task-form .fg label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}

.note{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:6px;transition:var(--tr)}
.note:hover{box-shadow:var(--shadow)}
.note-text{font-size:13px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
.note-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10.5px;color:var(--text3)}
.note-foot button{font-size:10.5px;color:var(--text3);padding:2px 6px;border-radius:3px}
.note-foot button:hover{background:var(--bg3);color:var(--text)}
.note-tags{display:flex;gap:4px;margin-top:4px}
.note-tag{font-size:9.5px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text3)}

.color-picker{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--tr);position:relative}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--bg2),0 0 0 4px var(--accent)}
.color-swatch.active::after{content:'\2713';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3)}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--accent);color:#fff;padding:8px 20px;border-radius:var(--radius);font-size:12.5px;font-weight:500;z-index:200;opacity:0;pointer-events:none;transition:all .2s ease;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:var(--radius-lg);width:460px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:scale(.97);transition:transform .15s}
.modal-bg.show .modal{transform:scale(1)}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:14px;font-weight:600}
.modal-body{padding:16px 20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.fr{display:flex;gap:10px}
.fr .fg{flex:1}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--text3)}
.empty .ei{font-size:36px;margin-bottom:10px;opacity:.25}
.empty p{font-size:12.5px;margin-bottom:14px}
.sec-head{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:3px 0;margin-bottom:6px;font-weight:600}
.proj-info{margin-top:20px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}
.saving-indicator{position:fixed;bottom:16px;right:16px;font-size:11px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);padding:4px 12px;border-radius:var(--radius);box-shadow:var(--shadow);opacity:0;transition:opacity .2s;z-index:50}
.saving-indicator.show{opacity:1}

/* Knowledge — memo style */
.kb-list{display:flex;flex-direction:column;gap:6px}
.kb-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;transition:var(--tr);cursor:pointer}
.kb-card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.kb-card-title{font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-card-preview{font-size:12px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kb-card-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.kb-tag{font-size:9.5px;padding:1px 7px;border-radius:3px;background:var(--bg3);color:var(--text3)}
.kb-card-foot{font-size:10px;color:var(--text3);margin-top:6px}
/* Knowledge editor — full area */
.kb-editor{display:flex;flex-direction:column;height:100%}
.kb-editor-topbar{margin-bottom:8px}
.kb-editor-topbar input{width:100%;font-size:18px;font-weight:600;border:none;padding:0;background:transparent;line-height:1.4}
.kb-editor-topbar input:focus{outline:none}
.kb-editor-topbar input::placeholder{color:var(--text3)}
.kb-editor-meta{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.kb-editor-meta input{width:auto;font-size:12px;padding:4px 8px}
.kb-editor-meta .fg-inline{display:flex;align-items:center;gap:4px}
.kb-editor-meta .fg-inline label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;white-space:nowrap;margin:0}
.kb-editor-body{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;min-height:300px;font-size:13.5px;line-height:1.8;overflow-y:auto;outline:none;color:var(--text);position:relative}
.kb-editor-body:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;white-space:pre-wrap;display:block}
.kb-editor-body img{max-width:100%;border-radius:var(--radius);margin:8px 0;display:block}
.kb-editor-body[contenteditable="false"]{cursor:default}
.kb-editor-toolbar{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.kb-editor-toolbar button{padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:4px;color:var(--text2);background:var(--bg2);transition:var(--tr)}
.kb-editor-toolbar button:hover{background:var(--bg3);color:var(--text)}
.kb-editor-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.kb-img-upload{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header"><h1>蘸酱Workspace</h1><p>项目 · 任务 · 想法</p></div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-v="dashboard" onclick="go('dashboard')"><span class="nav-icon">◉</span>总览</div>
      <div class="nav-item" data-v="timeline" onclick="go('timeline')"><span class="nav-icon">━</span>时间轴</div>
      <div class="nav-item" data-v="notes" onclick="go('notes')"><span class="nav-icon">✎</span>想法</div>
      <div class="nav-item" data-v="knowledge" onclick="go('knowledge')"><span class="nav-icon">◈</span>知识</div>
    </div>
    <div class="divider"></div>
    <div class="section-label">项目</div>
    <div class="project-list" id="pl"></div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </div>
  <div class="main">
    <div class="main-header"><h2 id="vt">总览</h2><div class="header-right" id="hr"></div></div>
    <div class="content" id="mc"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="saving-indicator" id="saving">保存中…</div>

<!-- Project Modal -->
<div class="modal-bg" id="pm"><div class="modal">
  <div class="modal-head"><h3 id="pmt">新建项目</h3><button class="btn-icon" onclick="cm('pm')">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>名称</label><input id="pn" placeholder="项目名称"></div>
    <div class="fg"><label>描述</label><textarea id="pd" rows="2" placeholder="简要描述"></textarea></div>
    <div class="fg"><label>色调</label><div class="color-picker" id="cpicker"></div></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-danger" id="pdel" style="margin-right:auto;display:none" onclick="delProj()">删除</button>
    <button class="btn btn-ghost" onclick="cm('pm')">取消</button>
    <button class="btn btn-primary" id="psb" onclick="saveP()">创建</button>
  </div>
</div></div>

<!-- Task Modal -->
<div class="modal-bg" id="tm"><div class="modal">
  <div class="modal-head"><h3 id="tmt">新建任务</h3><button class="btn-icon" onclick="cm('tm')">✕</button></div>
  <div class="modal-body">
    <div class="fg"><label>任务</label><input id="tt" placeholder="任务标题"></div>
    <div class="fg"><label>描述</label><textarea id="td" rows="2" placeholder="补充说明"></textarea></div>
    <div class="fg"><label>所属项目</label><select id="tp"></select></div>
    <div class="fr">
      <div class="fg"><label>优先级</label><select id="tpr"><option value="urgent">紧急</option><option value="high">高</option><option value="medium" selected>中</option><option value="low">低</option></select></div>
      <div class="fg"><label>状态</label><select id="ts"><option value="todo">待办</option><option value="doing">进行中</option><option value="done">已完成</option></select></div>
    </div>
    <div class="fr">
      <div class="fg"><label>开始</label><input type="date" id="tsd"></div>
      <div class="fg"><label>截止</label><input type="date" id="ted"></div>
    </div>
  </div>
  <div class="modal-foot">

    if(items[i].type.startsWith('image/')){
      e.preventDefault();
      const file=items[i].getAsFile();
      kbFileToImg(file);
      return;
    }
  }
}

function kbInsertImg(input){
  if(!input.files||!input.files[0])return;
  kbFileToImg(input.files[0]);
  input.value='';
}

function kbFileToImg(file){
  if(file.size>2*1024*1024){toast('图片不能超过 2MB');return}
  const reader=new FileReader();
  reader.onload=function(e){
    const img=document.createElement('img');
    img.src=e.target.result;
    const el=document.getElementById('kbBody');
    el.focus();
    // Insert at cursor
    const sel=window.getSelection();
    if(sel.rangeCount){
      const range=sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(img);
      range.collapse(false);
    }else{
      el.appendChild(img);
    }
    kbAutoSave();
  };
  reader.readAsDataURL(file);
}

let kbSaveTimer=null;
function kbAutoSave(){
  if(!isAdmin)return;
  clearTimeout(kbSaveTimer);
  kbSaveTimer=setTimeout(()=>{
    const title=(document.getElementById('kbTitle')?.value||'').trim();
    if(!title)return;
    if(!D.knowledge)D.knowledge=[];
    const body=document.getElementById('kbBody')?.innerHTML||'';
    const tags=(document.getElementById('kbTags')?.value||'').split(/[,，]/).map(s=>s.trim()).filter(Boolean);
    
    if(kbEditing==='new'){
      const nk={id:uid(),title,body,tags,ct:new Date().toISOString()};
      D.knowledge.push(nk);
      kbEditing=nk.id; // switch from 'new' to actual id
    }else{
      const k=D.knowledge.find(x=>x.id===kbEditing);
      if(k){k.title=title;k.body=body;k.tags=tags}
    }
    sbSave();
  },800);
}

function kbSaveAndBack(){
  kbAutoSave();
  setTimeout(()=>{kbEditing=null;rKB();toast('知识已保存')},200);
}

function kbDel(kid){
  if(!confirm('确认删除？'))return;
  D.knowledge=(D.knowledge||[]).filter(k=>k.id!==kid);
  sbSave();kbEditing=null;rKB();toast('知识已删除');
}

function delProj(){if(!editP||!confirm('确认删除项目及其所有任务？'))return;D.projects=D.projects.filter(p=>p.id!==editP.id);D.tasks=D.tasks.filter(t=>t.pid!==editP.id);sbSave();cm('pm');go('dashboard');toast('项目已删除')}

function saveT(){const title=document.getElementById('tt').value.trim();const pid=document.getElementById('tp').value;if(!title){toast('请输入任务标题');return}if(!pid){toast('请选择所属项目');return}const o={title,desc:document.getElementById('td').value.trim(),pid,pr:document.getElementById('tpr').value,st:document.getElementById('ts').value,sd:document.getElementById('tsd').value,ed:document.getElementById('ted').value};if(editT)Object.assign(editT,o);else{o.id=uid();o.ct=new Date().toISOString();D.tasks.push(o)}sbSave();cm('tm');R();toast(editT?'任务已保存':'任务已创建')}
function delTask(){if(!editT||!confirm('确认删除？'))return;D.tasks=D.tasks.filter(t=>t.id!==editT.id);sbSave();cm('tm');R();toast('任务已删除')}
function tog(tid){if(!isAdmin)return;const t=D.tasks.find(x=>x.id===tid);if(!t)return;t.st=t.st==='done'?'todo':'done';sbSave();R()}
function qAdd(e,pid){if(e.key!=='Enter'||!isAdmin)return;const el=document.getElementById('qi');const v=el.value.trim();if(!v)return;D.tasks.push({id:uid(),title:v,pid,pr:'medium',st:'todo',sd:td(),ed:'',desc:'',ct:new Date().toISOString()});sbSave();el.value='';R();toast('任务已添加');setTimeout(()=>{const e=document.getElementById('qi');if(e)e.focus()},30)}

// ===== UTIL =====
function pSort(a,b){return po(a.pr)-po(b.pr)}
function po(p){return{urgent:0,high:1,medium:2,low:3}[p]||2}
function fmt(iso){const d=new Date(iso);return`${d.getMonth()+1}-${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function $(i,v){document.getElementById(i).textContent=v}
function $h(v){document.getElementById('hr').innerHTML=v}
function $c(v){document.getElementById('mc').innerHTML=v}
function om(i){document.getElementById(i).classList.add('show')}
function cm(i){document.getElementById(i).classList.remove('show')}
document.querySelectorAll('.modal-bg').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-bg.show').forEach(el=>el.classList.remove('show'))});
